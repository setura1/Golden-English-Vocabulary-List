<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes,viewport-fit=cover">
    <title>金の英単語：修行システム</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg: #0a0f1d;
            --container: #161e2d;
            --card-bg: #1f2937;
            --text: #f3f4f6;
            --primary: #d4af37;
            --success: #10b981;
            --danger: #ef4444;
            --gray: #9ca3af;
            --accent: #6366f1;
            --gold: #f59e0b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { 
            margin: 0; width: 100%; height: 100%; background: var(--bg); 
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
            color: var(--text); overflow-x: hidden; touch-action: manipulation;
        }
        
        #setup, #report { padding: 30px 20px; min-height: 100vh; display: none; }
        #setup.active, #report.active { display: block; }
        #app { display: none; position: fixed; inset: 0; background: var(--bg); flex-direction: column; padding: 15px; z-index: 100; }
        #app.active { display: flex; }

        .container { max-width: 600px; margin: 0 auto; background: var(--container); border-radius: 32px; padding: 25px; border: 1px solid #374151; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        h1 { font-size: 26px; text-align: center; margin: 0 0 20px 0; color: var(--gold); font-weight: 800; letter-spacing: 2px; }

        .dashboard { background: rgba(0, 0, 0, 0.2); border-radius: 20px; padding: 20px; margin-bottom: 25px; border: 1px solid #374151; }
        .db-bar { height: 12px; display: flex; border-radius: 6px; overflow: hidden; background: #000; margin-bottom: 15px; }
        .db-seg { height: 100%; transition: width 0.8s ease-in-out; }
        .seg-a { background: var(--gold); }
        .seg-b { background: var(--accent); }
        .seg-c { background: var(--danger); }
        .seg-new { background: #374151; }
        .db-legend { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .lg-item { text-align: center; }
        .lg-label { font-size: 10px; color: var(--gray); display: block; margin-bottom: 4px; font-weight: bold; }
        .lg-val { font-size: 13px; font-weight: 800; }

        .input-group { background: #1f2937; padding: 15px; border-radius: 20px; border: 1px solid #4b5563; margin-bottom: 15px; }
        .input-group span { font-size: 11px; margin-bottom: 8px; color: var(--gray); display: block; font-weight: 800; text-transform: uppercase; }
        
        .adj-container { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .adj-btn { background: #374151; color: white; border: none; width: 48px; height: 40px; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
        .adj-btn:active { background: var(--gold); transform: scale(0.95); }

        input[type="number"] { width: 90px; background: transparent; border: none; color: #fff; font-size: 22px; font-weight: 800; text-align: center; }
        textarea { width: 100%; height: 60px; background: rgba(0,0,0,0.3); color: var(--gray); border: 1px solid #374151; border-radius: 15px; padding: 12px; font-size: 12px; margin-top: 10px; resize: none; outline: none; }

        .main-btn { width: 100%; height: 70px; border: none; border-radius: 24px; font-size: 24px; font-weight: 800; cursor: pointer; background: var(--gold); color: #000; transition: 0.3s; margin-top: 10px; }
        .main-btn:hover { filter: brightness(1.1); }
        .main-btn:active { transform: scale(0.98); }

        .io-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 12px; font-size: 11px; font-weight: 800; cursor: pointer; margin-left: 5px; }
        
        #card { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; background: var(--card-bg); border-radius: 50px; margin: 15px 0; position: relative; border: 1px solid #374151; box-shadow: inset 0 0 50px rgba(0,0,0,0.5); }
        #itemBadge { position: absolute; top: 40px; font-size: 12px; font-weight: 800; padding: 6px 20px; border-radius: 30px; border: 2px solid currentColor; letter-spacing: 1px; }
        
        #questionText { font-size: 42px; font-weight: 900; line-height: 1.2; margin-bottom: 20px; color: #fff; }
        #answerText { font-size: 26px; color: var(--gold); font-weight: 700; min-height: 2em; opacity: 0; transition: opacity 0.3s; }
        #answerText.visible { opacity: 1; }
        
        #timerTrack { width: 80%; height: 6px; background: #111827; margin-top: 30px; border-radius: 3px; overflow: hidden; opacity: 0; }
        #timerTrack.active { opacity: 1; }
        #timerBar { height: 100%; background: var(--danger); width: 0%; }

        .progress-container { width: 100%; height: 6px; background: #1f2937; border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        #progressBar { height: 100%; background: var(--gold); width: 0%; transition: width 0.4s ease; }
        
        .ans-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 20px; }
        .ans-btn { height: 100px; border: none; border-radius: 35px; color: white; font-size: 28px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        #correctBtn { background: var(--success); box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4); }
        #wrongBtn { background: var(--danger); box-shadow: 0 10px 20px -5px rgba(239, 68, 68, 0.4); }
        .ans-btn:active { transform: translateY(4px); filter: brightness(0.9); }
    </style>
</head>
<body>

<div id="setup" class="active">
    <div class="container">
        <h1>金の英単語 修行</h1>

        <div class="dashboard">
            <div class="db-bar">
                <div id="bar-a" class="db-seg seg-a"></div>
                <div id="bar-b" class="db-seg seg-b"></div>
                <div id="bar-c" class="db-seg seg-c"></div>
                <div id="bar-new" class="db-seg seg-new"></div>
            </div>
            <div class="db-legend">
                <div class="lg-item"><span class="lg-label">習得済</span><span id="val-a" class="lg-val" style="color:var(--gold)">0</span></div>
                <div class="lg-item"><span class="lg-label">継続中</span><span id="val-b" class="lg-val" style="color:var(--accent)">0</span></div>
                <div class="lg-item"><span class="lg-label">要復習</span><span id="val-c" class="lg-val" style="color:var(--danger)">0</span></div>
                <div class="lg-item"><span class="lg-label">未着手</span><span id="val-new" class="lg-val" style="color:var(--gray)">0</span></div>
            </div>
        </div>
        
        <div class="input-group">
            <div style="display:flex; justify-content: space-between; align-items: center;">
                <span>学習データの保存と復元</span>
                <div>
                    <button class="io-btn" onclick="exportData()">保存</button>
                    <button class="io-btn" style="background:var(--success)" onclick="importData()">復元</button>
                </div>
            </div>
            <textarea id="importArea" placeholder="ここに保存用データを貼り付けて「復元」を押してください"></textarea>
        </div>

        <div class="input-group">
            <span>修行の範囲設定</span>
            <div class="adj-container">
                <button class="adj-btn" onclick="adj('rangeStart', -100)">-</button>
                <input type="number" id="rangeStart" value="1">
                <span>から</span>
                <input type="number" id="rangeEnd" value="1462">
                <button class="adj-btn" onclick="adj('rangeEnd', 100)">+</button>
            </div>
        </div>

        <div class="input-group">
            <span>一回の修行数と制限時間</span>
            <div class="adj-container" style="justify-content: space-around;">
                <div style="text-align:center">
                    <input type="number" id="testLimit" value="20" style="font-size:28px">
                    <div class="lg-label">語</div>
                </div>
                <div style="text-align:center">
                    <input type="number" id="limitTime" value="2.5" step="0.1" style="font-size:28px">
                    <div class="lg-label">秒</div>
                </div>
            </div>
        </div>

        <button class="main-btn" onclick="startTraining()">修行を開始する</button>
    </div>
</div>

<div id="app">
    <div id="infoText" style="text-align:center; font-size:12px; color:var(--gray); margin-bottom:8px; font-weight:bold; letter-spacing: 1px;"></div>
    <div class="progress-container"><div id="progressBar"></div></div>
    <div id="card">
        <div id="itemBadge"></div>
        <div id="questionText"></div>
        <div id="answerText"></div>
        <div id="timerTrack"><div id="timerBar"></div></div>
    </div>
    <div class="ans-btns">
        <button id="wrongBtn" class="ans-btn" onclick="processAnswer(false)">苦手 (A)</button>
        <button id="correctBtn" class="ans-btn" onclick="processAnswer(true)">わかる (Z)</button>
    </div>
    <div style="text-align:center;">
        <button onclick="finishTraining()" style="background:none; border:none; color:var(--gray); font-size:12px; font-weight:bold; cursor:pointer; text-decoration: underline;">修行を中断する (Space)</button>
    </div>
</div>

<div id="report">
    <div class="container" style="text-align:center; padding: 40px 20px;">
        <h1 id="reportGreeting">お疲れ様でした</h1>
        <div style="font-size:14px; color:var(--gray); margin-bottom:10px;">今回の正解数</div>
        <div id="resultScore" style="font-size:54px; font-weight:900; color:var(--gold); margin-bottom:30px;"></div>
        <div style="font-size:12px; color:var(--gray); margin-bottom:10px;">現在の学習進捗コード</div>
        <textarea id="numericalArea" style="height:80px; text-align:center;" readonly></textarea>
        <button class="main-btn" onclick="location.reload()" style="background:var(--gray); color:white; margin-top:30px;">トップ画面に戻る</button>
    </div>
</div>

<script>
const STORAGE_KEY = 'gold_phrase_v2_data';
let ITEMS = [];
let mastery = {};
let queue = [];
let results = [];
let activeItem = null;
let stressTimer = null;
let audioCtx = null;

function playSound(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = type === 'correct' ? 'sine' : 'square';
    osc.frequency.setValueAtTime(type === 'correct' ? 880 : 220, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.15);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.15);
}

function loadData() {
    const raw = document.getElementById('csv-data').textContent.trim();
    ITEMS = raw.split('\n').map((line, idx) => {
        const commaIndex = line.indexOf(',');
        const lastDigitMatch = line.match(/\d+$/);
        
        if (commaIndex === -1 || !lastDigitMatch) return null;

        const q = line.substring(0, commaIndex).trim();
        const aFull = line.substring(commaIndex + 1, lastDigitMatch.index).trim();
        const id = parseInt(lastDigitMatch[0]);

        return { id, q, a: aFull };
    }).filter(item => item !== null);
}

function updateDashboard() {
    const total = ITEMS.length || 1462;
    const counts = { a: 0, b: 0, c: 0, new: 0 };
    Object.values(mastery).forEach(v => { if(counts[v] !== undefined) counts[v]++; });
    counts.new = Math.max(0, total - (counts.a + counts.b + counts.c));
    
    ['a', 'b', 'c', 'new'].forEach(k => {
        const val = counts[k];
        const pct = (val / total * 100).toFixed(1);
        document.getElementById(`bar-${k}`).style.width = pct + '%';
        document.getElementById(`val-${k}`).textContent = `${val} (${pct}%)`;
    });
}

function speak(txt, lang, rate = 1.0) {
    window.speechSynthesis.cancel();
    const ut = new SpeechSynthesisUtterance(txt);
    ut.lang = lang;
    ut.rate = rate;
    window.speechSynthesis.speak(ut);
}

function startTraining() {
    const start = parseInt(document.getElementById('rangeStart').value);
    const end = parseInt(document.getElementById('rangeEnd').value);
    const limit = parseInt(document.getElementById('testLimit').value);
    
    let available = ITEMS.filter(item => item.id >= start && item.id <= end);
    if (available.length === 0) return alert("指定された範囲に単語が見つかりませんでした");

    available.sort(() => Math.random() - 0.5);
    queue = available.slice(0, limit);
    results = [];
    document.getElementById("setup").classList.remove('active');
    document.getElementById("app").classList.add('active');
    nextItem();
}

function nextItem() {
    clearTimeout(stressTimer);
    const track = document.getElementById("timerTrack");
    const bar = document.getElementById("timerBar");
    track.classList.remove('active');
    bar.style.transition = "none";
    bar.style.width = "0%";
    document.getElementById("answerText").classList.remove('visible');
    
    if (queue.length === 0) return finishTraining();
    activeItem = queue.shift();
    
    document.getElementById("infoText").textContent = `ID: ${activeItem.id} ／ 残り ${queue.length + 1} 語`;
    document.getElementById("progressBar").style.width = `${(results.length / (results.length + queue.length + 1)) * 100}%`;
    
    const status = mastery[activeItem.id];
    const badge = document.getElementById("itemBadge");
    badge.textContent = status === 'a' ? "MASTERED" : (status === 'b' ? "LEARNING" : (status === 'c' ? "REVIEW" : "UNTOUCHED"));
    badge.style.color = status === 'c' ? "var(--danger)" : (status === 'b' ? "var(--accent)" : (status === 'a' ? "var(--gold)" : "var(--gray)"));

    document.getElementById("questionText").textContent = activeItem.q;
    document.getElementById("answerText").textContent = activeItem.a;
    
    speak(activeItem.q, 'en-US', 0.9);
    
    setTimeout(() => {
        document.getElementById("answerText").classList.add('visible');
        speak(activeItem.a, 'ja-JP', 1.1);
        startStressTimer();
    }, 1200);
}

function startStressTimer() {
    const sec = parseFloat(document.getElementById('limitTime').value) || 2.5;
    const track = document.getElementById("timerTrack");
    const bar = document.getElementById("timerBar");
    track.classList.add('active');
    bar.style.transition = `width ${sec}s linear`;
    bar.style.width = "100%";
    stressTimer = setTimeout(() => processAnswer(false), sec * 1000);
}

function processAnswer(isOk) {
    clearTimeout(stressTimer);
    if (!activeItem) return;
    playSound(isOk ? 'correct' : 'wrong');
    const id = activeItem.id;
    if (isOk) {
        mastery[id] = (mastery[id] === 'c') ? 'b' : 'a';
    } else {
        mastery[id] = 'c';
    }
    results.push({ ...activeItem, ok: isOk });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(mastery));
    nextItem();
}

function finishTraining() {
    window.speechSynthesis.cancel();
    document.getElementById("app").classList.remove('active');
    document.getElementById("report").classList.add('active');
    const okCount = results.filter(r => r.ok).length;
    const total = results.length;
    document.getElementById("resultScore").textContent = `${okCount} / ${total}`;
    
    const greeting = document.getElementById("reportGreeting");
    if (total > 0 && okCount / total === 1) {
        greeting.textContent = "完璧な修行でしたね";
    } else if (okCount / total >= 0.8) {
        greeting.textContent = "その調子で続けましょう";
    } else {
        greeting.textContent = "一歩ずつ着実に進みましょう";
    }
    
    document.getElementById("numericalArea").value = Object.keys(mastery).map(id=>`${id}${mastery[id]}`).join(',');
}

function adj(id, delta) {
    const el = document.getElementById(id);
    el.value = Math.max(1, parseInt(el.value) + delta);
    updateDashboard();
}

function exportData() {
    const s = Object.keys(mastery).map(id=>`${id}${mastery[id]}`).join(',');
    document.getElementById('importArea').value = s;
    navigator.clipboard.writeText(s).then(() => alert("進捗コードをクリップボードにコピーしました"));
}

function importData() {
    const txt = document.getElementById('importArea').value.trim();
    if(!txt) return;
    mastery = {};
    txt.split(',').forEach(t => {
        const m = t.match(/(\d+)([abc])/);
        if (m) mastery[parseInt(m[1])] = m[2];
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(mastery));
    updateDashboard();
    alert("学習データを正常に復元しました");
}

window.onload = () => {
    loadData();
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try { mastery = JSON.parse(saved); } catch(e) { mastery = {}; }
    }
    updateDashboard();
};

document.onkeydown = (e) => {
    if (!document.getElementById("app").classList.contains('active')) return;
    const key = e.key.toLowerCase();
    if (key === 'z') processAnswer(true);
    if (key === 'a') processAnswer(false);
    if (e.code === 'Space') { e.preventDefault(); finishTraining(); }
};
</script>
